name: FitTrack Pro CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run Lint
        run: npm run lint
        working-directory: ./backend
        continue-on-error: false

      - name: Run Build
        run: npm run build
        working-directory: ./backend

      - name: Run Unit Tests
        run: npm run test
        working-directory: ./backend

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run Lint
        run: npm run lint
        working-directory: ./frontend
        continue-on-error: false

      - name: Run Build
        run: npm run build
        working-directory: ./frontend

      - name: Run Unit Tests
        run: npm run test
        working-directory: ./frontend
